version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    groups:
      radix-ui:
        patterns:
          - "@radix-ui/*"
      vercel:
        patterns:
          - "@vercel/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
      types:
        patterns:
          - "@types/*"
      commitlint:
        patterns:
          - "@commitlint/*"
    ignore:
      - dependency-name: "next"
        update-types: [ "version-update:semver-major" ]
      - dependency-name: "react"
        update-types: [ "version-update:semver-major" ]
      - dependency-name: "react-dom"
        update-types: [ "version-update:semver-major" ]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "github-actions"

